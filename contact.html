<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact Arjun</title>

<meta name="description"
content="Contact Arjun through this accessible form.">
</head>

<body>

<header>
    <h1>Contact Me</h1>
</header>

<main>

<form aria-label="Contact Form">

<div>
<label for="name">Full Name</label>
<input
type="text"
id="name"
name="name"
required>
</div>

<br>

<div>
<label for="email">Email Address</label>
<input
type="email"
id="email"
name="email"
required>
</div>

<br>

<div>
<label for="message">Message</label>
<textarea
id="message"
name="message"
rows="5"
required></textarea>
</div>

<br>

<button type="submit">
Send Message
</button>

</form>

</main>

<footer>
    <a href="index.html">Back Home</a>
</footer>

</body>
</html>
